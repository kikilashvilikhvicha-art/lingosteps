name: EAS Android AAB Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile (production = AAB for Play Store, preview = APK for sideloading)"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/lingosteps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install workspace dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Setup Expo + EAS CLI (with your account token)
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Link EAS project
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        run: eas init --id 4f81a4dc-0441-4ebd-bec3-32559c5cac14 --force --non-interactive

      - name: Run EAS Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive \
            --no-wait

      - name: Where to find your AAB
        run: |
          echo "================================================"
          echo "  Build queued on Expo cloud (~15-20 minutes)."
          echo "  Download your AAB from:"
          echo "  https://expo.dev (Projects → LingoSteps → Builds)"
          echo "================================================"
