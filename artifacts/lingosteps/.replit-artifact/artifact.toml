kind = "mobile"
previewPath = "/lingosteps/"
title = "LingoSteps"
version = "1.0.0"
id = "artifacts/lingosteps"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/lingosteps/" ]
localPort = 19695

[services.development]
run = "pnpm --filter @workspace/lingosteps run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lingosteps", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lingosteps", "run", "serve" ]

[services.env]
PORT = "19695"
BASE_PATH = "/lingosteps/"
